name: Deploy OTA Update (Capgo)

on:
    # Only `dev` auto-ships (→ staging channel). Production is workflow_dispatch-only
    # and gated by the Production environment's required reviewers, so a merge to
    # `main` can never push OTA JS to devices without an explicit approved run.
    push:
        branches: [dev]
    workflow_dispatch:
        inputs:
            channel:
                description: 'Capgo channel to deploy to'
                required: true
                default: 'staging'
                type: choice
                options:
                    - development
                    - staging
                    - production

permissions:
    contents: read

concurrency:
    group: capgo-deploy-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        # Protect with required reviewers in repo Settings → Environments → Production.
        # A production OTA (workflow_dispatch → production) pauses here for approval.
        environment: Production
        steps:
            - uses: actions/checkout@v7
              with:
                  submodules: true
                  token: ${{ secrets.SUBMODULE_TOKEN }}

            - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

            - uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install

            - name: Build native static export
              run: node scripts/native-build.js

            - name: Verify build output
              run: |
                  test -d out && test -f out/index.html || (echo "ERROR: out/ directory missing or incomplete" && exit 1)
                  echo "Bundle ready. File count: $(find out -type f | wc -l)"

            - name: Determine channel
              id: channel
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    echo "name=${{ github.event.inputs.channel }}" >> $GITHUB_OUTPUT
                  elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
                    echo "name=production" >> $GITHUB_OUTPUT
                  else
                    echo "name=staging" >> $GITHUB_OUTPUT
                  fi

            - name: Upload bundle to Capgo
              # Commit message via env, never inline — a multi-line message (or one
              # with quotes) injected into the run script breaks --comment quoting.
              env:
                  CAPGO_API_KEY: ${{ secrets.CAPGO_API_KEY }}
                  # Private E2E signing key (PEM contents of .capgo_key_v2). Its
                  # public half is baked into capacitor.config.ts, so the app only
                  # accepts bundles signed here.
                  CAPGO_PRIVATE_KEY: ${{ secrets.CAPGO_PRIVATE_KEY }}
                  COMMIT_MSG: ${{ github.event.head_commit.message }}
              run: |
                  COMMENT="${GITHUB_SHA:0:7} — $(printf '%s' "${COMMIT_MSG:-Manual deploy}" | head -n1)"
                  npx @capgo/cli@latest bundle upload \
                    --channel "${{ steps.channel.outputs.name }}" \
                    --apikey "$CAPGO_API_KEY" \
                    --key-data-v2 "$CAPGO_PRIVATE_KEY" \
                    --path ./out \
                    --auto-min-update-version \
                    --comment "$COMMENT"

            - name: Deployment summary
              run: |
                  echo "## OTA Deployment" >> $GITHUB_STEP_SUMMARY
                  echo "- **Channel:** ${{ steps.channel.outputs.name }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
