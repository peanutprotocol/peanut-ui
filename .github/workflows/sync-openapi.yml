name: Sync OpenAPI snapshot

# Runs daily and on demand. Pulls the live BE spec from staging, regenerates
# FE types, and opens an auto-PR if anything changed. Eliminates manual
# `pnpm gen:api` drift (which is exactly what bit us in PR #2030).
on:
    schedule:
        - cron: '0 8 * * 1-5' # weekdays 08:00 UTC
    workflow_dispatch: {}

permissions:
    contents: write
    pull-requests: write

jobs:
    sync:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Pull staging spec + regenerate
              run: |
                  node scripts/sync-openapi.mjs \
                    https://api.staging.peanut.me/openapi.json \
                    src/types/api.openapi.json
                  pnpm gen:api

            - name: Check for changes
              id: check
              run: |
                  if git diff --quiet src/types/; then
                    echo "changed=false" >> "$GITHUB_OUTPUT"
                  else
                    echo "changed=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Create PR
              if: steps.check.outputs.changed == 'true'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  BRANCH="auto/sync-openapi-$(date -u +%Y%m%d-%H%M%S)"
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git checkout -b "$BRANCH"
                  git add src/types/
                  git commit -m "chore(types): sync openapi snapshot from staging"
                  git push origin "$BRANCH"
                  gh pr create \
                    --head "$BRANCH" \
                    --base dev \
                    --title "chore(types): sync openapi snapshot from staging" \
                    --body "Auto-generated by .github/workflows/sync-openapi.yml. The BE has added or modified routes since the last sync — this PR regenerates src/types/api.openapi.json and the derived TS types so FE keeps type-safe access to the latest BE surface."
