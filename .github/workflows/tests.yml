name: Tests

on:
    push:
        branches: ['**']

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: true
                  token: ${{ secrets.SUBMODULE_TOKEN }}

            - uses: actions/setup-node@v4
              with:
                  node-version: '21.1.0'

            - uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Install Dependencies
              run: pnpm install

            - name: Check formatting
              run: pnpm prettier --check .

            # Generate Next.js route + asset type declarations without a full
            # build. tsconfig includes .next/types/**/*.ts; without these,
            # next-env.d.ts's image-types references can't resolve and every
            # static-asset import (.svg/.gif/.webp) cascades into TS2307.
            - name: Generate Next types
              run: pnpm next typegen

            - name: Typecheck
              run: pnpm typecheck

            - name: Validate internal links
              run: pnpm validate-links

            - name: Run Unit Tests
              run: pnpm test

            - name: Install Playwright Browsers
              run: npx playwright install --with-deps chromium

            - name: Run E2E Tests
              run: pnpm test:e2e

            - name: Upload Coverage
              uses: actions/upload-artifact@v4
              with:
                  name: coverage
                  path: coverage/

            - name: Upload Playwright Report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-report/
