// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }

    // sumsub eid module pulls from a private maven repo requiring credentials.
    // exclude it globally — we don't use electronic ID card verification.
    configurations.configureEach {
        exclude group: 'com.sumsub.sns', module: 'idensic-mobile-sdk-eid'
        exclude group: 'de.authada.library', module: 'aal'
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
